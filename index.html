var crudo=atob(empaquetado);
var cuantos=crudo.length;
var octetos=new Uint8Array(cuantos);
var largoLlave=llave.length;
for(var z=0;z<cuantos;z++){

}
var lector=new TextDecoder("utf-8");
return lector.decode(octetos);
}
